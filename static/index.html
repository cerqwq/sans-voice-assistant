<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sans 语音助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* 主球体 */
        .sphere-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
        }

        .sphere {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4a9eff, #1a5fff, #0a2a6e);
            box-shadow:
                0 0 60px rgba(74, 158, 255, 0.4),
                0 0 120px rgba(74, 158, 255, 0.2),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sphere:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 80px rgba(74, 158, 255, 0.6),
                0 0 160px rgba(74, 158, 255, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
        }

        .sphere.active {
            animation: pulse 2s infinite;
        }

        .sphere.listening {
            background: radial-gradient(circle at 30% 30%, #00ff88, #00cc6a, #006633);
            box-shadow:
                0 0 60px rgba(0, 255, 136, 0.4),
                0 0 120px rgba(0, 255, 136, 0.2),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
        }

        .sphere.speaking {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a24, #6e2a0a);
            box-shadow:
                0 0 60px rgba(255, 107, 107, 0.4),
                0 0 120px rgba(255, 107, 107, 0.2),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
            animation: speak 0.5s infinite alternate;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes speak {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* 粒子效果 */
        .particles {
            position: absolute;
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #4a9eff;
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 3s infinite;
        }

        @keyframes particle-float {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        /* 波形动画 */
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 40px;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .wave-container.active {
            opacity: 1;
        }

        .wave-bar {
            width: 4px;
            background: linear-gradient(to top, #4a9eff, #00ff88);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }

        /* 状态文字 */
        .status {
            text-align: center;
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 20px;
        }

        .status.active {
            color: #4a9eff;
        }

        /* 对话区域 */
        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #4a9eff, #1a5fff);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: #e6e6e6;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            padding: 0 8px;
        }

        /* 输入区域 */
        .input-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .text-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .text-input:focus {
            border-color: #4a9eff;
            background: rgba(255, 255, 255, 0.15);
        }

        .text-input::placeholder {
            color: #666;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4a9eff, #1a5fff);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }

        /* 功能按钮 */
        .functions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .func-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #8892b0;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .func-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #4a9eff;
            transform: scale(1.1);
        }

        .func-btn.active {
            background: rgba(74, 158, 255, 0.3);
            color: #4a9eff;
            border-color: #4a9eff;
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .sphere {
                width: 150px;
                height: 150px;
            }

            .particles {
                width: 250px;
                height: 250px;
                top: -50px;
                left: -50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主球体 -->
        <div class="sphere-container">
            <div class="sphere" id="sphere"></div>
            <div class="particles" id="particles"></div>
        </div>

        <!-- 波形动画 -->
        <div class="wave-container" id="wave">
            <!-- 由JavaScript生成 -->
        </div>

        <!-- 状态文字 -->
        <div class="status" id="status">点击球体开始对话</div>

        <!-- 对话区域 -->
        <div class="chat-container" id="chat">
            <div class="message assistant">
                <div class="message-bubble">你好！我是 Sans，你的语音助手。有什么我可以帮你的吗？</div>
                <div class="message-time">刚刚</div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <input type="text" class="text-input" id="textInput" placeholder="输入消息..." />
            <button class="send-btn" id="sendBtn">➤</button>
        </div>

        <!-- 功能按钮 -->
        <div class="functions">
            <button class="func-btn tooltip" id="micBtn" data-tooltip="语音输入">🎤</button>
            <button class="func-btn tooltip" id="settingsBtn" data-tooltip="设置">⚙️</button>
            <button class="func-btn tooltip" id="historyBtn" data-tooltip="历史">📜</button>
            <button class="func-btn tooltip" id="clearBtn" data-tooltip="清空">🗑️</button>
        </div>
    </div>

    <script>
        // 状态管理
        const state = {
            isListening: false,
            isSpeaking: false,
            isProcessing: false
        };

        // DOM元素
        const sphere = document.getElementById('sphere');
        const wave = document.getElementById('wave');
        const status = document.getElementById('status');
        const chat = document.getElementById('chat');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        // 初始化粒子
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(particle);
            }
        }

        // 初始化波形
        function initWave() {
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.animationDelay = i * 0.05 + 's';
                wave.appendChild(bar);
            }
        }

        // 更新状态
        function updateStatus(text, type = 'normal') {
            status.textContent = text;
            status.className = 'status' + (type === 'active' ? ' active' : '');
        }

        // 更新球体状态
        function updateSphere(state) {
            sphere.className = 'sphere';
            if (state === 'listening') {
                sphere.classList.add('listening');
                wave.classList.add('active');
            } else if (state === 'speaking') {
                sphere.classList.add('speaking');
                wave.classList.add('active');
            } else if (state === 'processing') {
                sphere.classList.add('active');
                wave.classList.remove('active');
            } else {
                wave.classList.remove('active');
            }
        }

        // 添加消息
        function addMessage(text, type = 'user') {
            const message = document.createElement('div');
            message.className = `message ${type}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            message.appendChild(bubble);
            message.appendChild(time);
            chat.appendChild(message);

            // 滚动到底部
            chat.scrollTop = chat.scrollHeight;
        }

        // 发送消息
        async function sendMessage(text) {
            if (!text.trim()) return;

            // 添加用户消息
            addMessage(text, 'user');
            textInput.value = '';

            // 更新状态
            updateStatus('正在思考...', 'active');
            updateSphere('processing');

            try {
                // 调用后端API
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                const response = data.response || data.message || '抱歉，没有收到回复。';

                // 添加助手消息
                addMessage(response, 'assistant');
                updateStatus('点击球体开始对话');

                // 语音播报
                speak(response);

            } catch (error) {
                addMessage('抱歉，出现了错误。', 'assistant');
                updateStatus('点击球体开始对话');
            }
        }

        // 生成响应（模拟）
        function generateResponse(text) {
            const responses = {
                '你好': '你好！有什么我可以帮你的吗？',
                '时间': `现在是 ${new Date().toLocaleTimeString('zh-CN')}`,
                '天气': '让我帮你查询天气...',
                '帮助': '我可以帮你查询天气、设置提醒、回答问题等。'
            };

            for (const [key, value] of Object.entries(responses)) {
                if (text.includes(key)) return value;
            }

            return `我收到了你的消息："${text}"。让我想想...`;
        }

        // 语音播报
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1;

                utterance.onstart = () => {
                    updateStatus('正在播报...', 'active');
                    updateSphere('speaking');
                };

                utterance.onend = () => {
                    updateStatus('点击球体开始对话');
                    updateSphere('idle');
                };

                speechSynthesis.speak(utterance);
            }
        }

        // 语音识别
        function startListening() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('您的浏览器不支持语音识别');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();

            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                state.isListening = true;
                updateStatus('正在聆听...', 'active');
                updateSphere('listening');
                micBtn.classList.add('active');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                textInput.value = transcript;

                if (event.results[0].isFinal) {
                    sendMessage(transcript);
                }
            };

            recognition.onend = () => {
                state.isListening = false;
                updateStatus('点击球体开始对话');
                updateSphere('idle');
                micBtn.classList.remove('active');
            };

            recognition.onerror = (event) => {
                console.error('语音识别错误:', event.error);
                state.isListening = false;
                updateStatus('语音识别失败，请重试');
                updateSphere('idle');
                micBtn.classList.remove('active');
            };

            recognition.start();
        }

        // 事件监听
        sphere.addEventListener('click', () => {
            if (state.isListening) {
                // 停止监听
            } else {
                startListening();
            }
        });

        sendBtn.addEventListener('click', () => {
            sendMessage(textInput.value);
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage(textInput.value);
            }
        });

        micBtn.addEventListener('click', startListening);

        document.getElementById('clearBtn').addEventListener('click', () => {
            chat.innerHTML = `
                <div class="message assistant">
                    <div class="message-bubble">对话已清空。有什么我可以帮你的吗？</div>
                    <div class="message-time">刚刚</div>
                </div>
            `;
        });

        // 初始化
        initParticles();
        initWave();
    </script>
</body>
</html>
